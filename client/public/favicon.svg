<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#CBB8FF"/>
      <stop offset="50%" stop-color="#89C4F4"/>
      <stop offset="100%" stop-color="#C7A4FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- outer glow -->
  <polygon points="32,2 38,24 60,32 38,40 32,62 26,40 4,32 26,24" fill="none" stroke="#C7A4FF" stroke-width="1" opacity="0.4" filter="url(#glow)"/>
  <!-- star body -->
  <polygon points="32,4 37,25 58,32 37,39 32,60 27,39 6,32 27,25" fill="url(#g)" opacity="0.85"/>
  <!-- top highlight -->
  <polygon points="32,4 37,25 32,28 27,25" fill="#fff" opacity="0.35"/>
  <!-- center sparkle -->
  <circle cx="32" cy="32" r="2.5" fill="#fff" opacity="0.9" filter="url(#glow)"/>
</svg>
